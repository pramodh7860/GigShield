services:
  - type: web
    name: gigshield-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile ; pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: asset-explorer
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
